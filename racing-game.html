<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽車遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            letter-spacing: 5px;
        }
        
        #gameContainer {
            position: relative;
            border: 4px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }
        
        #gameCanvas {
            display: block;
            background: #333;
            border-radius: 6px;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            font-size: 18px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
        }
        
        #playerStats, #aiStats {
            display: flex;
            gap: 20px;
        }
        
        #score {
            color: #00ff88;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #speed {
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #aiDistance, #playerDistance {
            color: #ffcc00;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 6px;
            z-index: 20;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 25px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #00ff88;
        }
        
        .btn-red {
            background: linear-gradient(45deg, #ff6b6b, #cc5555);
        }
        
        .btn-red:hover {
            box-shadow: 0 0 20px #ff6b6b;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        #finalScore, #finalResult {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        #finalScore {
            color: #00ff88;
        }
        
        #finalResult {
            font-size: 2.5rem;
        }
        
        .winner {
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
        }
        
        .loser {
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b;
        }
        
        .controls {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }
        
        .controls span {
            color: #00ff88;
            font-weight: bold;
        }
        
        .mode-select {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .mode-btn {
            padding: 20px 30px;
            font-size: 18px;
            border: 3px solid #00ff88;
            border-radius: 15px;
            background: transparent;
            color: #00ff88;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-btn:hover, .mode-btn.selected {
            background: #00ff88;
            color: #1a1a2e;
        }
    </style>
</head>
<body>
    <h1>🏎️ 賽車遊戲</h1>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="ui">
            <div id="playerStats">
                <span id="score">分數: 0</span>
                <span id="speed">速度: 0</span>
                <span id="playerDistance">距離: 0m</span>
            </div>
            <div id="aiStats" style="display: none;">
                <span id="aiDistance">電腦: 0m</span>
            </div>
        </div>
        <div id="startScreen">
            <h2 style="font-size: 2rem; margin-bottom: 20px; color: #00ff88;">準備好了嗎？</h2>
            <div class="mode-select">
                <button class="mode-btn selected" id="modeSolo" onclick="selectMode('solo')">單人練習</button>
                <button class="mode-btn" id="modeRace" onclick="selectMode('race')">對決電腦</button>
            </div>
            <button class="btn" onclick="startGame()">開始遊戲</button>
            <div class="controls">
                <p><span>← →</span> 左右移動</p>
                <p><span>↑ ↓</span> 加速減速</p>
            </div>
        </div>
        <div id="gameOverScreen">
            <h2 id="resultTitle" style="font-size: 2rem; margin-bottom: 20px;">遊戲結束!</h2>
            <div id="finalResult"></div>
            <div id="finalScore">最終分數: 0</div>
            <div id="finalDistance" style="font-size: 1.2rem; color: #aaa; margin-bottom: 10px;"></div>
            <button class="btn" onclick="restartGame()">再來一次</button>
            <button class="btn" onclick="backToMenu()">回主選單</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const speedEl = document.getElementById('speed');
        const playerDistanceEl = document.getElementById('playerDistance');
        const aiDistanceEl = document.getElementById('aiDistance');
        const aiStatsEl = document.getElementById('aiStats');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const finalResultEl = document.getElementById('finalResult');
        const resultTitleEl = document.getElementById('resultTitle');
        const finalDistanceEl = document.getElementById('finalDistance');
        const modeSoloBtn = document.getElementById('modeSolo');
        const modeRaceBtn = document.getElementById('modeRace');

        let gameRunning = false;
        let gameMode = 'solo';
        let score = 0;
        let speed = 0;
        let maxSpeed = 15;
        let roadOffset = 0;
        let raceDistance = 10000;
        let playerProgress = 0;
        let aiProgress = 0;
        
        const player = {
            x: 175,
            y: 480,
            width: 50,
            height: 80,
            color: '#ff6b6b'
        };

        const ai = {
            x: 175,
            y: 480,
            width: 50,
            height: 80,
            color: '#00ccff',
            speed: 0,
            maxSpeed: 13,
            targetLane: 1,
            changeTimer: 0
        };

        const keys = {
            left: false,
            right: false,
            up: false,
            down: false
        };

        let obstacles = [];
        let roadLines = [];
        
        function selectMode(mode) {
            gameMode = mode;
            modeSoloBtn.classList.toggle('selected', mode === 'solo');
            modeRaceBtn.classList.toggle('selected', mode === 'race');
            
            if (mode === 'race') {
                aiStatsEl.style.display = 'flex';
            } else {
                aiStatsEl.style.display = 'none';
            }
        }

        function init() {
            score = 0;
            speed = 0;
            player.x = 175;
            playerProgress = 0;
            aiProgress = 0;
            ai.x = 175;
            ai.speed = 0;
            ai.targetLane = 1;
            obstacles = [];
            roadLines = [];
            for (let i = 0; i < 6; i++) {
                roadLines.push({ y: i * 120 });
            }
        }

        function startGame() {
            init();
            startScreen.style.display = 'none';
            gameRunning = true;
            gameLoop();
        }

        function restartGame() {
            gameOverScreen.style.display = 'none';
            startGame();
        }

        function backToMenu() {
            gameOverScreen.style.display = 'none';
            startScreen.style.display = 'flex';
        }

        function gameOver(won) {
            gameRunning = false;
            
            if (gameMode === 'race') {
                if (won) {
                    resultTitleEl.textContent = '🏆 恭喜獲勝！';
                    resultTitleEl.style.color = '#00ff88';
                    finalResultEl.innerHTML = '<span class="winner">你贏了！</span>';
                } else {
                    resultTitleEl.textContent = '💀 輸了！';
                    resultTitleEl.style.color = '#ff6b6b';
                    finalResultEl.innerHTML = '<span class="loser">電腦獲勝！</span>';
                }
                finalScoreEl.textContent = '你的距離: ' + Math.floor(playerProgress) + 'm';
                finalDistanceEl.textContent = '電腦距離: ' + Math.floor(aiProgress) + 'm';
            } else {
                resultTitleEl.textContent = '遊戲結束!';
                resultTitleEl.style.color = '#ff6b6b';
                finalResultEl.innerHTML = '';
                finalScoreEl.textContent = '最終分數: ' + score;
                finalDistanceEl.textContent = '行駛距離: ' + Math.floor(playerProgress) + 'm';
            }
            
            gameOverScreen.style.display = 'flex';
        }

        function drawRoad() {
            ctx.fillStyle = '#444';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#666';
            ctx.fillRect(20, 0, 30, canvas.height);
            ctx.fillRect(350, 0, 30, canvas.height);

            ctx.fillStyle = '#fff';
            roadLines.forEach(line => {
                ctx.fillRect(195, line.y, 10, 60);
            });
        }

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            ctx.fillStyle = '#ffaa00';
            ctx.fillRect(player.x + 5, player.y + 60, 15, 15);
            ctx.fillRect(player.x + 30, player.y + 60, 15, 15);
            
            ctx.fillStyle = '#333';
            ctx.fillRect(player.x + 10, player.y + 10, 30, 20);
        }

        function drawAI() {
            if (gameMode !== 'race') return;
            
            ctx.fillStyle = ai.color;
            ctx.fillRect(ai.x, ai.y, ai.width, ai.height);
            
            ctx.fillStyle = '#ffaa00';
            ctx.fillRect(ai.x + 5, ai.y + 60, 15, 15);
            ctx.fillRect(ai.x + 30, ai.y + 60, 15, 15);
            
            ctx.fillStyle = '#333';
            ctx.fillRect(ai.x + 10, ai.y + 10, 30, 20);
            
            ctx.fillStyle = 'rgba(0, 204, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(ai.x + ai.width/2, ai.y + ai.height/2, 40, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawObstacles() {
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(obs.x + 5, obs.y + 5, 10, 10);
                ctx.fillRect(obs.x + obs.width - 15, obs.y + 5, 10, 10);
            });
        }

        function updateAI() {
            if (gameMode !== 'race') return;
            
            if (ai.speed < ai.maxSpeed) {
                ai.speed += 0.05;
            }

            const lanePositions = [70, 170, 270];
            const currentLane = lanePositions.findIndex(l => Math.abs(ai.x - l) < 30);
            
            let shouldChange = false;
            let safeLane = currentLane;
            
            for (let i = 0; i < lanePositions.length; i++) {
                let canMove = true;
                for (let obs of obstacles) {
                    if (obs.y > ai.y - 100 && obs.y < ai.y + 100) {
                        if (Math.abs(obs.x - lanePositions[i]) < 60) {
                            canMove = false;
                            break;
                        }
                    }
                }
                if (canMove && Math.random() < 0.3) {
                    safeLane = i;
                    shouldChange = true;
                }
            }
            
            if (shouldChange || Math.random() < 0.02) {
                ai.targetLane = safeLane >= 0 ? safeLane : Math.floor(Math.random() * 3);
            }
            
            const targetX = lanePositions[ai.targetLane];
            if (ai.x < targetX - 10) {
                ai.x += 3;
            } else if (ai.x > targetX + 10) {
                ai.x -= 3;
            }
            
            ai.x = Math.max(50, Math.min(300, ai.x));
            
            aiProgress += ai.speed * 2;
        }

        function checkAIWin() {
            if (gameMode === 'race' && aiProgress >= raceDistance) {
                gameOver(false);
                return true;
            }
            return false;
        }

        function update() {
            if (keys.left && player.x > 50) {
                player.x -= 5;
            }
            if (keys.right && player.x < 300) {
                player.x += 5;
            }
            if (keys.up && speed < maxSpeed) {
                speed += 0.1;
            }
            if (keys.down && speed > 0) {
                speed -= 0.2;
            }

            if (!keys.up && !keys.down) {
                speed *= 0.98;
            }

            roadLines.forEach(line => {
                const moveSpeed = gameMode === 'race' ? Math.max(speed, ai.speed) : speed;
                line.y += moveSpeed;
                if (line.y > canvas.height) {
                    line.y = -60;
                }
            });

            if (speed > 0 && Math.random() < 0.02 + speed * 0.005) {
                const lane = Math.floor(Math.random() * 3);
                obstacles.push({
                    x: 70 + lane * 100,
                    y: -80,
                    width: 50,
                    height: 60,
                    color: ['#00ff88', '#ff00ff', '#00ccff', '#ffcc00'][Math.floor(Math.random() * 4)]
                });
            }

            obstacles.forEach(obs => {
                obs.y += speed;
            });

            obstacles = obstacles.filter(obs => obs.y < canvas.height + 100);

            for (let obs of obstacles) {
                if (player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y) {
                    gameOver(false);
                    return;
                }
                
                if (gameMode === 'race') {
                    if (ai.x < obs.x + obs.width &&
                        ai.x + ai.width > obs.x &&
                        ai.y < obs.y + obs.height &&
                        ai.y + ai.height > obs.y) {
                        ai.speed = Math.max(3, ai.speed - 3);
                    }
                }
            }

            if (speed > 0) {
                score += Math.floor(speed / 5);
                playerProgress += speed * 2;
            }

            if (gameMode === 'race' && playerProgress >= raceDistance) {
                gameOver(true);
                return;
            }

            scoreEl.textContent = '分數: ' + score;
            speedEl.textContent = '速度: ' + Math.floor(speed * 10);
            playerDistanceEl.textContent = '距離: ' + Math.floor(playerProgress) + 'm';
            aiDistanceEl.textContent = '電腦: ' + Math.floor(aiProgress) + 'm';
        }

        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRoad();
            drawObstacles();
            drawPlayer();
            drawAI();
            update();
            updateAI();

            if (checkAIWin()) return;

            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
            if (e.key === 'ArrowUp' || e.key === 'w') keys.up = true;
            if (e.key === 'ArrowDown' || e.key === 's') keys.down = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
            if (e.key === 'ArrowUp' || e.key === 'w') keys.up = false;
            if (e.key === 'ArrowDown' || e.key === 's') keys.down = false;
        });
    </script>
</body>
</html>
